<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة إدارة شراع | Shira Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/style.css">
  <style>
    :root { --sidebar-bg: #0f172a; --sidebar-text: #cbd5e1; }
    body { display: flex; height: 100vh; overflow: hidden; background: #f8fafc; font-family: 'Tajawal', sans-serif; }
    .sidebar { width: 260px; background: var(--sidebar-bg); color: var(--sidebar-text); display: flex; flex-direction: column; padding: 20px; transition: 0.3s; }
    .sidebar h2 { color: #fff; text-align: center; margin-bottom: 30px; font-size: 24px; letter-spacing: 1px; }
    .nav-link { padding: 12px 15px; margin: 5px 0; border-radius: 8px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 10px; font-weight: 500; }
    .nav-link:hover, .nav-link.active { background: rgba(255,255,255,0.1); color: #fff; }
    .nav-link.logout { margin-top: auto; background: #ef4444; color: white; text-align: center; justify-content: center; }
    .main-content { flex: 1; overflow-y: auto; padding: 25px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
    .header h1 { font-size: 24px; color: #0f172a; }
    .admin-badge { background: #f59e0b; color: #fff; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .stat-card { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-right: 4px solid var(--p); }
    .stat-card h3 { font-size: 14px; color: #64748b; margin-bottom: 8px; }
    .stat-card .value { font-size: 28px; font-weight: 800; color: #0f172a; }
    .table-container { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 800px; }
    th, td { padding: 12px 15px; text-align: right; border-bottom: 1px solid #e2e8f0; }
    th { background: #f1f5f9; color: #475569; font-weight: 700; font-size: 13px; }
    tr:hover { background: #f8fafc; }
    .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 6px; border: none; cursor: pointer; margin-left: 5px; transition: 0.2s; }
    .btn-approve { background: #10b981; color: white; }
    .btn-reject { background: #ef4444; color: white; }
    .btn-view { background: #3b82f6; color: white; }
    .btn-sub { background: #f59e0b; color: white; }
    #login-overlay { position: fixed; inset: 0; background: #f8fafc; display: flex; align-items: center; justify-content: center; z-index: 999; }
    .login-box { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
    .hidden { display: none !important; }
    .badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; }
    .badge-success { background: #dcfce7; color: #166534; }
    .badge-warning { background: #fef3c7; color: #92400e; }
    .badge-danger { background: #fee2e2; color: #991b1b; }
    .badge-info { background: #dbeafe; color: #1e40af; }
    .input-field { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; margin-bottom: 10px; }
    .btn-primary { background: #0f172a; color: white; padding: 12px 20px; border-radius: 10px; border: none; cursor: pointer; font-weight: 600; width: 100%; }
    .btn-outline { background: transparent; border: 2px solid #64748b; color: #64748b; padding: 12px 20px; border-radius: 10px; cursor: pointer; font-weight: 600; }
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 2000; }
    .modal-content { background: white; padding: 25px; border-radius: 16px; width: 90%; max-width: 700px; max-height: 90vh; overflow-y: auto; position: relative; }
    .modal-close { position: absolute; top: 15px; left: 15px; font-size: 28px; cursor: pointer; color: #64748b; }
    .modal-close:hover { color: #ef4444; }
  </style>
</head>
<body>

  <!-- شاشة تسجيل الدخول -->
  <div id="login-overlay">
    <div class="login-box">
      <h2 style="margin-bottom: 20px; color: var(--p);">🛡️ دخول الإدارة</h2>
      <div class="form-group">
        <input type="email" id="admin-email" class="input-field" placeholder="البريد الإلكتروني للإدارة">
      </div>
      <div class="form-group">
        <input type="password" id="admin-pass" class="input-field" placeholder="كلمة المرور">
      </div>
      <button onclick="Admin.login()" class="btn-primary">دخول آمن</button>
      <p style="margin-top: 15px; font-size: 12px; color: var(--g);">يمكنك العودة للتطبيق من <a href="index.html">هنا</a></p>
    </div>
  </div>

  <!-- لوحة التحكم الرئيسية -->
  <div id="admin-panel" class="hidden" style="display: flex; width: 100%;">
    <aside class="sidebar" id="admin-nav">
      <h2>شراع | إدارة</h2>
      <!-- سيتم ملء القائمة ديناميكياً عبر JavaScript -->
    </aside>

    <main class="main-content">
      <div class="header">
        <h1 id="page-title">نظرة عامة</h1>
        <span class="admin-badge">مسؤول النظام</span>
      </div>
      
      <div id="content-area">
        <!-- هنا يتم تحميل المحتوى ديناميكياً -->
      </div>
    </main>
  </div>

  <!-- المكتبات الخارجية -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/config.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
